name: Quality

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - pawchive
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python environment
        uses: ./.github/actions/setup-python
        with:
          python-version: "3.12"

      - name: Validate package metadata
        run: poetry check

      - name: Validate normalized OpenAPI contract
        run: poetry run openapi-spec-validator k_generator/pawchive_openapi.normalized.json

      - name: Check generated API artifacts
        run: poetry run python -m k_generator.main --check

      - name: Lint contract tooling
        run: >-
          poetry run ruff check
          k_generator
          ktoolbox/api/client.py
          ktoolbox/api/errors.py
          ktoolbox/api/parameters.py
          ktoolbox/api/generated
          ktoolbox/action/base.py
          ktoolbox/action/fetch.py
          ktoolbox/action/search.py
          ktoolbox/api/utils.py
          ktoolbox/cli.py

      - name: Check contract tooling formatting
        run: >-
          poetry run ruff format --check
          k_generator
          ktoolbox/api/client.py
          ktoolbox/api/errors.py
          ktoolbox/api/parameters.py
          ktoolbox/api/generated
          ktoolbox/action/base.py
          ktoolbox/action/fetch.py
          ktoolbox/action/search.py
          ktoolbox/api/utils.py
          ktoolbox/cli.py

      - name: Type-check Pawchive client
        run: >-
          poetry run mypy --strict
          ktoolbox/api/client.py
          ktoolbox/api/errors.py
          ktoolbox/api/parameters.py
          ktoolbox/action/base.py
          ktoolbox/action/fetch.py
          ktoolbox/action/search.py
          ktoolbox/api/utils.py
          ktoolbox/cli.py
