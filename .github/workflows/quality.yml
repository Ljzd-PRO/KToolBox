name: Quality

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - pawchive
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python environment
        uses: ./.github/actions/setup-python
        with:
          python-version: "3.12"

      - name: Validate package metadata
        run: poetry check

      - name: Validate normalized OpenAPI contract
        run: poetry run openapi-spec-validator k_generator/pawchive_openapi.normalized.json

      - name: Check generated API artifacts
        run: poetry run python -m k_generator.main --check

      - name: Lint contract tooling
        run: >-
          poetry run ruff check
          k_generator
          ktoolbox/api
          ktoolbox/blocker
          ktoolbox/action/base.py
          ktoolbox/action/fetch.py
          ktoolbox/action/search.py
          ktoolbox/_enum.py
          ktoolbox/cli.py
          ktoolbox/cli_app.py
          ktoolbox/configuration.py
          ktoolbox/downloader/downloader.py
          ktoolbox/job/runner.py
          ktoolbox/job/stream.py
          ktoolbox/project_config.py
          ktoolbox/reporting.py
          ktoolbox/sync.py
          ktoolbox/utils.py
          tests

      - name: Check contract tooling formatting
        run: >-
          poetry run ruff format --check
          k_generator
          ktoolbox/api
          ktoolbox/blocker
          ktoolbox/action/base.py
          ktoolbox/action/fetch.py
          ktoolbox/action/search.py
          ktoolbox/_enum.py
          ktoolbox/cli.py
          ktoolbox/cli_app.py
          ktoolbox/configuration.py
          ktoolbox/downloader/downloader.py
          ktoolbox/job/runner.py
          ktoolbox/job/stream.py
          ktoolbox/project_config.py
          ktoolbox/reporting.py
          ktoolbox/sync.py
          ktoolbox/utils.py
          tests

      - name: Type-check Pawchive client
        run: >-
          poetry run mypy --strict
          ktoolbox/api/client.py
          ktoolbox/api/errors.py
          ktoolbox/api/parameters.py
          ktoolbox/action/base.py
          ktoolbox/action/fetch.py
          ktoolbox/action/search.py
          ktoolbox/api/utils.py
          ktoolbox/cli.py
          ktoolbox/cli_app.py
          ktoolbox/blocker
          ktoolbox/job/stream.py
          ktoolbox/project_config.py
          ktoolbox/reporting.py
          ktoolbox/sync.py

      - name: Compile Python sources
        run: poetry run python -m compileall -q ktoolbox k_generator

      - name: Test Pawchive API layer at 100% coverage
        run: >-
          poetry run pytest
          tests/ktoolbox/test_api_client.py
          tests/ktoolbox/test_api_contract.py
          tests/ktoolbox/test_api_utils.py
          --cov=ktoolbox.api.client
          --cov=ktoolbox.api.errors
          --cov=ktoolbox.api.parameters
          --cov=ktoolbox.api.utils
          --cov-branch
          --cov-fail-under=100

      - name: Test synchronization core at 100% coverage
        run: >-
          poetry run pytest
          tests/ktoolbox/test_blocker.py
          tests/ktoolbox/test_job_stream.py
          tests/ktoolbox/test_reporting.py
          tests/ktoolbox/test_sync.py
          --cov=ktoolbox.blocker.engine
          --cov=ktoolbox.blocker.field_match
          --cov=ktoolbox.blocker.model
          --cov=ktoolbox.job.stream
          --cov=ktoolbox.reporting
          --cov=ktoolbox.sync
          --cov-branch
          --cov-fail-under=100

      - name: Run hermetic test suite at 85% coverage
        run: poetry run pytest --cov --cov-fail-under=85

      - name: Build documentation without warnings
        run: poetry run mkdocs build --strict

      - name: Build source and wheel distributions
        run: poetry build
