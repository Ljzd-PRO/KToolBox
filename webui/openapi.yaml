openapi: 3.1.0
info:
  title: KToolBox WebUI API
  description: Authenticated REST API for the KToolBox WebUI. Selected operations also define the curated MCP tool surface
    through x-ktoolbox-mcp metadata.
  version: 1.0.0
  license:
    name: BSD-3-Clause
    identifier: BSD-3-Clause
paths:
  /api/v1/config/schema:
    get:
      summary: Get configuration schema
      operationId: config_schema
      parameters:
      - name: locale
        in: query
        required: false
        schema:
          enum:
          - zh-CN
          - zh-Hant
          - en
          - ja
          - ko
          - fr
          - ru
          type: string
          default: en
          title: Locale
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigSchemaResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      description: Return localized field metadata and redacted effective values for the project configuration.
      tags:
      - configuration
      security:
      - WebUISession: []
      x-ktoolbox-mcp:
        enabled: true
        name: config_schema
        scope: mcp:read
        safety: read
        openWorld: false
  /api/v1/config/dotenv/{name}:
    get:
      summary: Read an environment file
      operationId: get_dotenv
      parameters:
      - name: name
        in: path
        required: true
        schema:
          enum:
          - dotenv
          - production
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TextDocumentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      description: Read the raw project .env or prod.env document together with its revision.
      tags:
      - configuration
      security:
      - WebUISession: []
      x-ktoolbox-mcp:
        enabled: false
        name: get_dotenv
        scope: null
        safety: null
        openWorld: false
    put:
      summary: Replace an environment file
      operationId: replace_dotenv
      parameters:
      - name: name
        in: path
        required: true
        schema:
          enum:
          - dotenv
          - production
          type: string
          title: Name
      - name: If-Match
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: If-Match
      - name: X-CSRF-Token
        in: header
        required: true
        description: CSRF token returned by the current browser session.
        schema:
          type: string
          minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TextDocumentUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TextDocumentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      description: Atomically replace the raw project .env or prod.env document after an ETag check.
      tags:
      - configuration
      security:
      - WebUISession: []
      x-ktoolbox-mcp:
        enabled: false
        name: replace_dotenv
        scope: null
        safety: null
        openWorld: false
    patch:
      summary: Patch environment values
      operationId: patch_dotenv
      parameters:
      - name: name
        in: path
        required: true
        schema:
          enum:
          - dotenv
          - production
          type: string
          title: Name
      - name: If-Match
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: If-Match
      - name: X-CSRF-Token
        in: header
        required: true
        description: CSRF token returned by the current browser session.
        schema:
          type: string
          minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DotenvPatchRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TextDocumentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      description: Atomically update selected values in .env or prod.env after an ETag check.
      tags:
      - configuration
      security:
      - WebUISession: []
      x-ktoolbox-mcp:
        enabled: false
        name: patch_dotenv
        scope: null
        safety: null
        openWorld: false
  /api/v1/config/dotenv/{name}/validate:
    post:
      summary: Validate an environment file
      operationId: validate_dotenv
      parameters:
      - name: name
        in: path
        required: true
        schema:
          enum:
          - dotenv
          - production
          type: string
          title: Name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TextDocumentUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      description: Validate environment-file text without saving it.
      tags:
      - configuration
      security:
      - WebUISession: []
      x-ktoolbox-mcp:
        enabled: false
        name: validate_dotenv
        scope: null
        safety: null
        openWorld: false
  /api/v1/config/example:
    get:
      summary: Download example configuration
      operationId: example_configuration
      responses:
        '200':
          description: Successful Response
          content:
            text/plain:
              schema:
                type: string
      description: Render and download a documented example environment file.
      tags:
      - configuration
      security:
      - WebUISession: []
      x-ktoolbox-mcp:
        enabled: false
        name: example_configuration
        scope: null
        safety: null
        openWorld: false
  /api/v1/config/project:
    get:
      summary: Read project configuration
      operationId: get_project_config
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDocumentResponse'
      description: Read the raw ktoolbox.toml document and its parsed project configuration.
      tags:
      - configuration
      security:
      - WebUISession: []
      x-ktoolbox-mcp:
        enabled: false
        name: get_project_config
        scope: null
        safety: null
        openWorld: false
    put:
      summary: Replace project configuration
      operationId: replace_project_config
      parameters:
      - name: If-Match
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: If-Match
      - name: X-CSRF-Token
        in: header
        required: true
        description: CSRF token returned by the current browser session.
        schema:
          type: string
          minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TextDocumentUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDocumentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      description: Atomically replace ktoolbox.toml after validation and an ETag check.
      tags:
      - configuration
      security:
      - WebUISession: []
      x-ktoolbox-mcp:
        enabled: false
        name: replace_project_config
        scope: null
        safety: null
        openWorld: false
  /api/v1/config/project/validate:
    post:
      summary: Validate project configuration
      operationId: validate_project_config
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TextDocumentUpdate'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      description: Validate ktoolbox.toml text without saving it.
      tags:
      - configuration
      security:
      - WebUISession: []
      x-ktoolbox-mcp:
        enabled: false
        name: validate_project_config
        scope: null
        safety: null
        openWorld: false
  /api/v1/creators:
    get:
      summary: List configured creators
      operationId: list_creators
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/CreatorRosterItemResponse'
                type: array
                title: Response List Creators
      description: List the project creator roster with cached Pawchive presentation names.
      tags:
      - creators
      security:
      - WebUISession: []
      x-ktoolbox-mcp:
        enabled: true
        name: list_creators
        scope: mcp:read
        safety: read
        openWorld: false
    post:
      summary: Add a creator
      operationId: add_creator
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatorReference'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatorReference'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      description: Add a creator identity to the project roster.
      tags:
      - creators
      security:
      - WebUISession: []
      x-ktoolbox-mcp:
        enabled: true
        name: add_creator
        scope: mcp:write
        safety: write
        openWorld: false
      parameters:
      - name: X-CSRF-Token
        in: header
        required: true
        description: CSRF token returned by the current browser session.
        schema:
          type: string
          minLength: 1
  /api/v1/creators/{service}/{creator_id}:
    put:
      summary: Update a creator
      operationId: update_creator
      parameters:
      - name: service
        in: path
        required: true
        schema:
          type: string
          title: Service
      - name: creator_id
        in: path
        required: true
        schema:
          type: string
          title: Creator Id
      - name: X-CSRF-Token
        in: header
        required: true
        description: CSRF token returned by the current browser session.
        schema:
          type: string
          minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatorUpdateRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatorReference'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      description: Update the note and enabled state of a configured creator.
      tags:
      - creators
      security:
      - WebUISession: []
      x-ktoolbox-mcp:
        enabled: true
        name: update_creator
        scope: mcp:write
        safety: write
        openWorld: false
    delete:
      summary: Remove a creator
      operationId: delete_creator
      parameters:
      - name: service
        in: path
        required: true
        schema:
          type: string
          title: Service
      - name: creator_id
        in: path
        required: true
        schema:
          type: string
          title: Creator Id
      - name: X-CSRF-Token
        in: header
        required: true
        description: CSRF token returned by the current browser session.
        schema:
          type: string
          minLength: 1
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatorReference'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      description: Remove a creator from the project roster and clear its cached presentation profile.
      tags:
      - creators
      security:
      - WebUISession: []
      x-ktoolbox-mcp:
        enabled: true
        name: delete_creator
        scope: mcp:write
        safety: destructive
        openWorld: false
  /api/v1/blockers:
    get:
      summary: List ignore rules
      operationId: list_blockers
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockerListResponse'
      description: Return the ordered project ignore-rule definitions.
      tags:
      - ignore-rules
      security:
      - WebUISession: []
      x-ktoolbox-mcp:
        enabled: true
        name: list_blockers
        scope: mcp:read
        safety: read
        openWorld: false
    put:
      summary: Replace ignore rules
      operationId: replace_blockers
      requestBody:
        content:
          application/json:
            schema:
              items:
                $ref: '#/components/schemas/BlockerSpec'
              type: array
              title: Blockers
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockerListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      description: Validate and replace the complete ordered ignore-rule collection.
      tags:
      - ignore-rules
      security:
      - WebUISession: []
      x-ktoolbox-mcp:
        enabled: true
        name: replace_blockers
        scope: mcp:write
        safety: destructive
        openWorld: false
      parameters:
      - name: X-CSRF-Token
        in: header
        required: true
        description: CSRF token returned by the current browser session.
        schema:
          type: string
          minLength: 1
  /api/v1/filesystem:
    get:
      tags:
      - filesystem
      summary: Browse files and directories
      operationId: browse_filesystem
      parameters:
      - name: scope
        in: query
        required: false
        schema:
          enum:
          - project
          - host
          type: string
          default: project
          title: Scope
      - name: mode
        in: query
        required: false
        schema:
          enum:
          - directory
          - file
          type: string
          default: directory
          title: Mode
      - name: path
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Path
      - name: search
        in: query
        required: false
        schema:
          type: string
          maxLength: 256
          default: ''
          title: Search
      - name: include_hidden
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Include Hidden
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 100
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilesystemBrowseResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      description: Browse a project or host filesystem location for the WebUI path picker.
      security:
      - WebUISession: []
      x-ktoolbox-mcp:
        enabled: false
        name: browse_filesystem
        scope: null
        safety: null
        openWorld: false
  /api/v1/filesystem/directories:
    post:
      tags:
      - filesystem
      summary: Create a directory
      operationId: create_directory
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FilesystemCreateDirectoryRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilesystemEntryResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      description: Create a directory through the WebUI path picker.
      security:
      - WebUISession: []
      x-ktoolbox-mcp:
        enabled: false
        name: create_directory
        scope: null
        safety: null
        openWorld: false
      parameters:
      - name: X-CSRF-Token
        in: header
        required: true
        description: CSRF token returned by the current browser session.
        schema:
          type: string
          minLength: 1
    delete:
      tags:
      - filesystem
      summary: Delete an empty directory
      operationId: delete_directory
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FilesystemDeleteDirectoryRequest'
        required: true
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      description: Delete an empty directory through the WebUI path picker.
      security:
      - WebUISession: []
      x-ktoolbox-mcp:
        enabled: false
        name: delete_directory
        scope: null
        safety: null
        openWorld: false
      parameters:
      - name: X-CSRF-Token
        in: header
        required: true
        description: CSRF token returned by the current browser session.
        schema:
          type: string
          minLength: 1
  /api/v1/pawchive/creators:
    get:
      summary: Search Pawchive creators
      operationId: creators
      parameters:
      - name: creator_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Creator Id
      - name: name
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
      - name: service
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Service
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CreatorSummary'
                title: Response Creators
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      description: Search Pawchive for creators using an ID, name, or platform filter.
      tags:
      - pawchive
      security:
      - WebUISession: []
      x-ktoolbox-mcp:
        enabled: true
        name: search_creators
        scope: mcp:read
        safety: read
        openWorld: true
  /api/v1/pawchive/posts:
    get:
      summary: Search Pawchive works
      operationId: posts
      parameters:
      - name: creator_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Creator Id
      - name: name
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
      - name: service
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Service
      - name: query
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Query
      - name: offset
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
                title: Response Posts
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      description: Search Pawchive for works using creator identity and text filters.
      tags:
      - pawchive
      security:
      - WebUISession: []
      x-ktoolbox-mcp:
        enabled: true
        name: search_works
        scope: mcp:read
        safety: read
        openWorld: true
  /api/v1/pawchive/posts/{service}/{creator_id}/{post_id}:
    get:
      summary: Get a Pawchive work
      operationId: post_details
      parameters:
      - name: service
        in: path
        required: true
        schema:
          type: string
          title: Service
      - name: creator_id
        in: path
        required: true
        schema:
          type: string
          title: Creator Id
      - name: post_id
        in: path
        required: true
        schema:
          type: string
          title: Post Id
      - name: revision_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Revision Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                anyOf:
                - $ref: '#/components/schemas/Post'
                - $ref: '#/components/schemas/Revision'
                title: Response Post Details
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      description: Return one Pawchive work or a selected historical revision.
      tags:
      - pawchive
      security:
      - WebUISession: []
      x-ktoolbox-mcp:
        enabled: true
        name: get_work
        scope: mcp:read
        safety: read
        openWorld: true
  /api/v1/pawchive/posts/{service}/{creator_id}/{post_id}/revisions:
    get:
      summary: List work revisions
      operationId: post_revisions
      parameters:
      - name: service
        in: path
        required: true
        schema:
          type: string
          title: Service
      - name: creator_id
        in: path
        required: true
        schema:
          type: string
          title: Creator Id
      - name: post_id
        in: path
        required: true
        schema:
          type: string
          title: Post Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Revision'
                title: Response Post Revisions
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      description: Return the known historical revisions for one Pawchive work.
      tags:
      - pawchive
      security:
      - WebUISession: []
      x-ktoolbox-mcp:
        enabled: true
        name: list_work_revisions
        scope: mcp:read
        safety: read
        openWorld: true
  /api/v1/pawchive/site-version:
    get:
      summary: Get Pawchive version
      operationId: site_version
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteVersionResponse'
      description: Return the version reported by the configured Pawchive service.
      tags:
      - pawchive
      security:
      - WebUISession: []
      x-ktoolbox-mcp:
        enabled: true
        name: get_pawchive_version
        scope: mcp:read
        safety: read
        openWorld: true
  /api/v1/tasks:
    get:
      tags:
      - tasks
      summary: List tasks
      operationId: list_tasks
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/TaskRecord'
                type: array
                title: Response List Tasks
      description: Return the persistent task queue in scheduling order.
      security:
      - WebUISession: []
      x-ktoolbox-mcp:
        enabled: true
        name: list_tasks
        scope: mcp:read
        safety: read
        openWorld: false
    post:
      tags:
      - tasks
      summary: Create a task
      operationId: create_task
      requestBody:
        content:
          application/json:
            schema:
